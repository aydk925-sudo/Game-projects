<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bouncy Ball</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;background:#111;
  display:flex;align-items:center;justify-content:center;
  font-family:'Courier New',monospace;overflow:hidden;
}
#wrap{
  position:relative;
  width:min(94vw,420px);
  aspect-ratio:210/360;
  image-rendering:pixelated;
  cursor:none;
}
canvas{width:100%;height:100%;image-rendering:pixelated;display:block;}

/* ── Menu: bottom panel (NOT full overlay) ── */
#menuOv{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(5,8,18,.92);
  border-top:1px solid #2a4a3a;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 14px 14px;
  gap:7px;
  cursor:default;
}
#menuOv.hidden{display:none;}
.menu-top-row{
  width:100%;display:flex;justify-content:space-between;align-items:flex-start;
}
.menu-title{font-size:14px;font-weight:bold;letter-spacing:4px;color:#a8f0c8;}
.menu-stats{display:flex;gap:14px;font-size:9px;color:#88aa99;letter-spacing:1px;}
.menu-stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.menu-stat-val{font-size:12px;color:#fff;letter-spacing:1px;}
.menu-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,#2a4a3a,transparent);}
.pickers-row{display:flex;gap:16px;align-items:flex-start;justify-content:center;width:100%;}
.picker{display:flex;flex-direction:column;align-items:center;gap:3px;}
.picker-label{font-size:7px;color:#557766;letter-spacing:2px;text-transform:uppercase;}
.picker-row{display:flex;align-items:center;gap:5px;}
.arr{
  background:#0a1a12;border:1px solid #2a4a3a;color:#a8f0c8;
  font-size:11px;width:20px;height:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.arr:hover{background:#1a3a2a;}
.picker-canvas{image-rendering:pixelated;border:1px solid #2a4a3a;}
.picker-name{font-size:8px;color:#a8f0c8;letter-spacing:1px;text-align:center;}
.picker-price{font-size:7px;color:#ffd700;letter-spacing:1px;text-align:center;min-height:10px;}
.buy-btn{
  background:#1a2a00;border:1px solid #88cc00;color:#88cc00;
  font-family:inherit;font-size:7px;letter-spacing:1px;
  padding:3px 8px;cursor:pointer;text-transform:uppercase;display:none;
}
.buy-btn:hover{background:#2a4a00;}
.buy-btn:disabled{opacity:.4;cursor:default;}
.tap-hint{font-size:7px;color:#3a5a4a;letter-spacing:2px;text-transform:uppercase;}

/* ── Pause overlay ── */
#pauseOv{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.78);color:#eee;font-family:'Courier New',monospace;
  gap:10px;cursor:default;
}
#pauseOv.hidden{display:none;}

/* ── Game Over overlay ── */
#gameoverOv{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);color:#eee;font-family:'Courier New',monospace;
  gap:10px;cursor:default;
}
#gameoverOv.hidden{display:none;}

/* ── Shop overlay ── */
#shopOv{
  position:absolute;inset:0;
  background:rgba(0,0,0,.92);
  display:flex;flex-direction:column;align-items:center;
  color:#eee;font-family:'Courier New',monospace;
  overflow-y:auto;padding:16px 10px;gap:8px;cursor:default;
}
#shopOv.hidden{display:none;}

.big{font-size:22px;font-weight:bold;letter-spacing:4px;color:#a8f0c8;}
.sub{font-size:9px;color:#88aa99;letter-spacing:2px;}
.val{font-size:16px;color:#fff;letter-spacing:2px;}
.btn{
  background:#1a3a2a;border:2px solid #a8f0c8;color:#a8f0c8;
  font-family:inherit;font-size:10px;letter-spacing:2px;padding:7px 18px;
  cursor:pointer;text-transform:uppercase;
}
.btn:hover{background:#2a5a3a;}
.btn-row{display:flex;gap:8px;}
hr.ov-hr{width:80%;border:none;border-top:1px solid #2a4a3a;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="210" height="360"></canvas>

  <!-- Menu: bottom panel -->
  <div id="menuOv">
    <div class="menu-top-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <a href="index.html" style="color:#557766;font-size:9px;letter-spacing:1px;text-decoration:none;border:1px solid #2a4a3a;padding:2px 6px;cursor:pointer;" onclick="event.stopPropagation()">⌂ HOME</a>
        <div class="menu-title">BOUNCY BALL</div>
      </div>
      <div class="menu-stats">
        <div class="menu-stat">
          <span style="font-size:7px;color:#557766;letter-spacing:1px;">BEST</span>
          <span class="menu-stat-val" id="menuBest">0</span>
        </div>
        <div class="menu-stat">
          <span style="font-size:7px;color:#557766;letter-spacing:1px;">COINS</span>
          <span class="menu-stat-val" id="menuCoins">0</span>
        </div>
      </div>
    </div>
    <div class="menu-divider"></div>
    <div class="pickers-row">
      <!-- Skin picker -->
      <div class="picker">
        <div class="picker-label">SKIN</div>
        <div class="picker-row">
          <div class="arr" id="skinLeft">◀</div>
          <canvas class="picker-canvas" id="skinPreviewC" width="36" height="36"></canvas>
          <div class="arr" id="skinRight">▶</div>
        </div>
        <div class="picker-name" id="skinLabel">DEFAULT</div>
        <div class="picker-price" id="skinPrice"></div>
        <button class="buy-btn" id="btnBuySkin">BUY</button>
      </div>
      <!-- Theme picker -->
      <div class="picker">
        <div class="picker-label">MAP</div>
        <div class="picker-row">
          <div class="arr" id="themeLeft">◀</div>
          <canvas class="picker-canvas" id="themePreviewC" width="36" height="36"></canvas>
          <div class="arr" id="themeRight">▶</div>
        </div>
        <div class="picker-name" id="themeLabel">SKY</div>
        <div class="picker-price" id="themePrice"></div>
        <button class="buy-btn" id="btnBuyTheme">BUY</button>
      </div>
    </div>
    <div class="tap-hint">TAP ANYWHERE TO START</div>
  </div>

  <!-- Pause -->
  <div id="pauseOv" class="hidden">
    <div class="big" style="color:#a8f0c8;">PAUSED</div>
    <hr class="ov-hr">
    <div class="sub">▲ <span id="pauseScore">0</span> &nbsp;·&nbsp; 🪙 <span id="pauseCoins">0</span></div>
    <hr class="ov-hr">
    <div class="btn-row">
      <button class="btn" id="btnResume">RESUME</button>
      <button class="btn" id="btnPauseMenu">MENU</button>
    </div>
    <div class="sub" style="margin-top:4px;">E · RESUME</div>
  </div>

  <!-- Game Over -->
  <div id="gameoverOv" class="hidden">
    <div class="big" style="color:#e87060;">GAME OVER</div>
    <hr class="ov-hr">
    <div class="sub">SCORE</div><div class="val" id="goScore">0</div>
    <div class="sub">COINS EARNED</div><div class="val" id="goCoins">0</div>
    <div class="sub">BEST</div><div class="val" id="goBest">0</div>
    <hr class="ov-hr">
    <div class="btn-row">
      <button class="btn" id="btnRetry">RETRY</button>
      <button class="btn" id="btnMenu">MENU</button>
      <a href="index.html" class="btn" style="text-decoration:none;">HOME</a>
    </div>
  </div>

</div>

<script>
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=210,H=360;

// ── Persistence ──
const LS={
  get:(k,d)=>{ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v); }catch(e){return d;} },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};
let totalCoins    =LS.get('bb-coins', 0);
let bestScore     =LS.get('bb-best',  0);
let ownedSkins    =['default'];
let ownedThemes   =['sky'];
let equippedSkin  =LS.get('bb-eskin',  'default');
let equippedTheme =LS.get('bb-etheme', 'sky');
function saveAll(){
  LS.set('bb-coins',totalCoins); LS.set('bb-best',bestScore);
  LS.set('bb-eskin',equippedSkin); LS.set('bb-etheme',equippedTheme);
}

// ── Audio ──
let AC;
function getAC(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq,dur,type='square',vol=0.15){
  try{
    const ac=getAC(), g=ac.createGain();
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    g.connect(ac.destination);
    const o=ac.createOscillator();
    o.type=type; o.frequency.value=freq;
    o.connect(g); o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
const SFX={
  bounce:()=>beep(220,.08,'sine',.12),
  spring:()=>{ beep(440,.05,'square',.1); setTimeout(()=>beep(660,.1,'square',.1),50); },
  shoot: ()=>beep(880,.06,'sawtooth',.08),
  hit:   ()=>beep(110,.15,'sawtooth',.18),
  coin:  ()=>{ beep(660,.06,'sine',.1); setTimeout(()=>beep(880,.06,'sine',.1),60); },
  die:   ()=>{ beep(150,.4,'sawtooth',.2); setTimeout(()=>beep(80,.6,'square',.2),200); },
};

// ── Skins ──
const SKIN_LIST=['default','fire','ice','star','blackhole'];
const SKINS={
  default:  {name:'DEFAULT',cost:0,  draw:(cx,x,y,r)=>{ cx.fillStyle='#a8f0c8'; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); cx.fillStyle='#fff'; cx.beginPath(); cx.arc(x-r*.3,y-r*.3,r*.25,0,Math.PI*2); cx.fill(); }},
  fire:     {name:'FIRE',   cost:30, draw:(cx,x,y,r)=>{ cx.fillStyle='#ff6020'; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); cx.fillStyle='#ffcc00'; cx.beginPath(); cx.arc(x,y,r*.6,0,Math.PI*2); cx.fill(); cx.fillStyle='rgba(255,255,255,.5)'; cx.beginPath(); cx.arc(x-r*.25,y-r*.3,r*.18,0,Math.PI*2); cx.fill(); }},
  ice:      {name:'ICE',    cost:30, draw:(cx,x,y,r)=>{ cx.fillStyle='#80d8ff'; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); cx.fillStyle='rgba(255,255,255,.5)'; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); cx.fillStyle='#e0f8ff'; [0,60,120,180,240,300].forEach(a=>{ const rad=a*Math.PI/180; cx.fillRect(x+Math.cos(rad)*r*.3-1,y+Math.sin(rad)*r*.3-1,2,2); }); }},
  star:     {name:'STAR',   cost:60, draw:(cx,x,y,r)=>{ cx.fillStyle='#ffe040'; const pts=5,inner=r*.45; cx.beginPath(); for(let i=0;i<pts*2;i++){ const a=(i*Math.PI/pts)-Math.PI/2; const rr=i%2===0?r:inner; cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr); } cx.closePath(); cx.fill(); cx.fillStyle='rgba(255,255,255,.5)'; cx.beginPath(); cx.arc(x-r*.2,y-r*.25,r*.2,0,Math.PI*2); cx.fill(); }},
  blackhole:{name:'B.HOLE', cost:100,draw:(cx,x,y,r)=>{ const g=cx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,'#000'); g.addColorStop(.6,'#330066'); g.addColorStop(1,'#9900cc'); cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); cx.strokeStyle='rgba(200,100,255,.6)'; cx.lineWidth=1; cx.beginPath(); cx.arc(x,y,r+2,0,Math.PI*2); cx.stroke(); }},
};

// unlock all skins
ownedSkins = SKIN_LIST.slice();

// ── Map-specific skins ──
const MAP_SKIN_LISTS={
  sky:      ['sky_cloud','sky_sun','sky_storm','sky_rainbow','sky_wind'],
  ocean:    ['ocean_bubble','ocean_coral','ocean_pearl','ocean_deep','ocean_tide'],
  lavacave: ['lava_magma','lava_crystal','lava_skull','lava_coal','lava_gold'],
};
Object.assign(SKINS,{
  sky_cloud:   {name:'CLOUD',  cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#eef4ff';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,255,255,.78)';cx.beginPath();cx.arc(x-r*.3,y-r*.08,r*.54,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+r*.3,y-r*.08,r*.44,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x,y+r*.1,r*.5,0,Math.PI*2);cx.fill();}},
  sky_sun:     {name:'SUN',    cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='rgba(255,200,0,.22)';cx.beginPath();cx.arc(x,y,r*1.3,0,Math.PI*2);cx.fill();cx.strokeStyle='#ffa000';cx.lineWidth=2;for(let i=0;i<8;i++){const a=i*Math.PI/4;cx.beginPath();cx.moveTo(x+Math.cos(a)*r*.8,y+Math.sin(a)*r*.8);cx.lineTo(x+Math.cos(a)*r*1.25,y+Math.sin(a)*r*1.25);cx.stroke();}cx.fillStyle='#ffcc00';cx.beginPath();cx.arc(x,y,r*.72,0,Math.PI*2);cx.fill();cx.fillStyle='#ffe84a';cx.beginPath();cx.arc(x,y,r*.4,0,Math.PI*2);cx.fill();}},
  sky_storm:   {name:'STORM',  cost:0,draw:(cx,x,y,r)=>{const g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'#607080');g.addColorStop(1,'#1e2830');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.strokeStyle='#ffe040';cx.lineWidth=2;cx.beginPath();cx.moveTo(x-r*.15,y-r*.5);cx.lineTo(x+r*.15,y-r*.05);cx.lineTo(x-r*.1,y+r*.15);cx.lineTo(x+r*.25,y+r*.6);cx.stroke();}},
  sky_rainbow: {name:'RAINBOW',cost:0,draw:(cx,x,y,r)=>{cx.save();cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.clip();['#ff4040','#ff9020','#ffee20','#40dd40','#2080ff','#9040ff'].forEach((c,i,a)=>{cx.fillStyle=c;cx.fillRect(x-r,y-r+i*(r*2/a.length),r*2,r*2/a.length);});cx.fillStyle='rgba(255,255,255,.22)';cx.beginPath();cx.arc(x-r*.3,y-r*.3,r*.28,0,Math.PI*2);cx.fill();cx.restore();}},
  sky_wind:    {name:'WIND',   cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#c8f0ff';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(80,160,220,.65)';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(x-r*.6,y-r*.2);cx.bezierCurveTo(x-r*.2,y-r*.55,x+r*.2,y+r*.2,x+r*.65,y-r*.1);cx.stroke();cx.beginPath();cx.moveTo(x-r*.5,y+r*.25);cx.bezierCurveTo(x-r*.1,y-r*.1,x+r*.3,y+r*.45,x+r*.7,y+r*.1);cx.stroke();cx.fillStyle='rgba(255,255,255,.45)';cx.beginPath();cx.arc(x-r*.25,y-r*.25,r*.18,0,Math.PI*2);cx.fill();}},
  ocean_bubble:{name:'BUBBLE', cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='rgba(100,190,255,.22)';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(160,220,255,.85)';cx.lineWidth=1.8;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(255,255,255,.7)';cx.beginPath();cx.arc(x-r*.35,y-r*.35,r*.22,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,255,255,.3)';cx.beginPath();cx.arc(x+r*.2,y-r*.5,r*.1,0,Math.PI*2);cx.fill();}},
  ocean_coral: {name:'CORAL',  cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#e05870';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.fillStyle='#f07888';for(let i=0;i<6;i++){const a=i*Math.PI/3;cx.beginPath();cx.arc(x+Math.cos(a)*r*.5,y+Math.sin(a)*r*.5,r*.28,0,Math.PI*2);cx.fill();}cx.fillStyle='#ff9aaa';cx.beginPath();cx.arc(x,y,r*.28,0,Math.PI*2);cx.fill();}},
  ocean_pearl: {name:'PEARL',  cost:0,draw:(cx,x,y,r)=>{const g=cx.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);g.addColorStop(0,'#fff');g.addColorStop(.45,'#e8d8f0');g.addColorStop(1,'#a090b8');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,255,255,.6)';cx.beginPath();cx.arc(x-r*.3,y-r*.3,r*.22,0,Math.PI*2);cx.fill();}},
  ocean_deep:  {name:'ABYSS',  cost:0,draw:(cx,x,y,r)=>{const g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'#003060');g.addColorStop(.6,'#001828');g.addColorStop(1,'#00080e');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(0,200,255,.65)';[[-.5,-.2],[.4,.3],[-.2,.5],[.5,-.4],[0,-.6]].forEach(([dx,dy])=>{cx.beginPath();cx.arc(x+dx*r,y+dy*r,1.5,0,Math.PI*2);cx.fill();});cx.fillStyle='rgba(0,220,200,.35)';cx.beginPath();cx.arc(x,y,r*.32,0,Math.PI*2);cx.fill();}},
  ocean_tide:  {name:'TIDE',   cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#1a6080';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.save();cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.clip();cx.fillStyle='rgba(80,200,220,.5)';cx.beginPath();cx.moveTo(x-r,y+r*.1);for(let i=0;i<=4;i++){cx.bezierCurveTo(x-r+i*r*.5,y-r*.25,x-r+i*r*.5+r*.25,y+r*.35,x-r+(i+1)*r*.5,y+r*.1);}cx.lineTo(x+r,y+r);cx.lineTo(x-r,y+r);cx.closePath();cx.fill();cx.restore();cx.fillStyle='rgba(200,240,255,.3)';cx.beginPath();cx.arc(x-r*.25,y-r*.3,r*.17,0,Math.PI*2);cx.fill();}},
  lava_magma:  {name:'MAGMA',  cost:0,draw:(cx,x,y,r)=>{const g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'#ffcc00');g.addColorStop(.45,'#ff6600');g.addColorStop(1,'#7a0000');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.strokeStyle='#6a0000';cx.lineWidth=1;[[0,.68],[1.05,.58],[2.1,.7],[3.14,.6],[4.2,.65],[5.24,.55]].forEach(([a,l])=>{cx.beginPath();cx.moveTo(x,y);cx.lineTo(x+Math.cos(a)*r*l,y+Math.sin(a)*r*l);cx.stroke();});}},
  lava_crystal:{name:'CRYSTAL',cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#2020a0';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(100,120,255,.55)';cx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3;i===0?cx.moveTo(x+Math.cos(a)*r*.82,y+Math.sin(a)*r*.82):cx.lineTo(x+Math.cos(a)*r*.82,y+Math.sin(a)*r*.82);}cx.closePath();cx.fill();cx.fillStyle='rgba(200,220,255,.6)';cx.beginPath();cx.arc(x-r*.28,y-r*.32,r*.2,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(160,180,255,.4)';cx.lineWidth=1;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.stroke();}},
  lava_skull:  {name:'SKULL',  cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#d0c8b8';cx.beginPath();cx.arc(x,y-r*.1,r*.88,0,Math.PI*2);cx.fill();cx.fillStyle='#aaa098';cx.fillRect(x-r*.4,y+r*.32,r*.3,r*.4);cx.fillRect(x+r*.1,y+r*.32,r*.3,r*.4);cx.fillStyle='#181008';cx.beginPath();cx.ellipse(x-r*.28,y-r*.05,r*.2,r*.23,0,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(x+r*.28,y-r*.05,r*.2,r*.23,0,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,80,0,.4)';cx.beginPath();cx.ellipse(x-r*.28,y-r*.05,r*.11,r*.13,0,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(x+r*.28,y-r*.05,r*.11,r*.13,0,0,Math.PI*2);cx.fill();}},
  lava_coal:   {name:'COAL',   cost:0,draw:(cx,x,y,r)=>{cx.fillStyle='#181010';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.strokeStyle='#ff4400';cx.lineWidth=1;[[0,.62],[1.05,.5],[2.1,.68],[3.14,.55],[4.2,.65],[5.24,.5]].forEach(([a,l])=>{cx.beginPath();cx.moveTo(x+Math.cos(a)*r*.12,y+Math.sin(a)*r*.12);cx.lineTo(x+Math.cos(a)*r*l,y+Math.sin(a)*r*l);cx.stroke();});cx.fillStyle='rgba(255,70,0,.3)';cx.beginPath();cx.arc(x,y,r*.32,0,Math.PI*2);cx.fill();}},
  lava_gold:   {name:'GOLD',   cost:0,draw:(cx,x,y,r)=>{const g=cx.createRadialGradient(x-r*.25,y-r*.2,0,x,y,r);g.addColorStop(0,'#fff0a0');g.addColorStop(.5,'#ffa000');g.addColorStop(1,'#7a4800');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(180,100,0,.4)';cx.lineWidth=1.5;cx.beginPath();cx.arc(x,y,r*.6,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(255,255,200,.45)';cx.beginPath();cx.arc(x-r*.3,y-r*.25,r*.18,0,Math.PI*2);cx.fill();}},
});
ownedSkins=[...ownedSkins,...Object.values(MAP_SKIN_LISTS).flat()];
function getActiveSkinList(){ return MAP_SKIN_LISTS[equippedTheme]||SKIN_LIST; }

// ── Themes ──

const THEMES_DEF={
  sky:      {name:'SKY',  cost:0,  pfCol:'#c8f0d8', bg:cy=>skyBg(cy)},
  ocean:    {name:'OCEAN',cost:50, pfCol:'#80d0e0', bg:cy=>oceanBg(cy)},

};
// unlock all themes
ownedThemes = THEME_LIST.slice();
function skyBg(camY){

  if(alt<2000){
    ctx.fillStyle='#87ceeb'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.6)';
    [[40,60],[130,100],[80,180],[160,220]].forEach(([cx2,cy2])=>{
      const wy=cy2-(camY%H);
      ctx.beginPath(); ctx.arc(cx2,wy,14,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2+12,wy+4,10,0,Math.PI*2); ctx.fill();
    });
  } else if(alt<5000){
    const t=(alt-2000)/3000;
    ctx.fillStyle=`rgb(${Math.round(135*(1-t)+10*t)},${Math.round(206*(1-t)+10*t)},${Math.round(235*(1-t)+40*t)})`;
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle='#050510'; ctx.fillRect(0,0,W,H);

}

// ── Game state ──
let state='menu';
let camY=0,score=0,sessionCoins=0;
let ball={},platforms=[],enemies=[],projectiles=[],enemyProjectiles=[],particles=[],coins=[];
let keys={},shootCooldown=0,globalFreezeTimer=0,tideReady=false,tideBounces=0;
const BALL_R=6,GRAVITY=0.35,JUMP_VY=-8.5,SPRING_VY=-16,PLAT_H=6;

function newGame(){
  camY=0; score=0; sessionCoins=0; shootCooldown=0; globalFreezeTimer=0; tideReady=false; tideBounces=0;
  ball={x:W/2,y:H-30,vx:0,vy:JUMP_VY,dead:false,invuln:0,bounceCount:0};
  if(equippedSkin==='lava_skull') ball.invuln=3;
  platforms=[]; enemies=[]; projectiles=[]; enemyProjectiles=[]; particles=[]; coins=[];
  platforms.push({x:W/2-25,y:H-20,w:50,type:'normal',vx:0,timer:0,broken:false});
  for(let i=0;i<14;i++) genPlatform(H-50-i*32);
}

function genPlatform(y){
  const roll=Math.random()*100;
  let type='normal';
  if(roll<2)       type='spike';
  else if(roll<4)  type='spring';
  else if(roll<14) type='breakable';
  else if(roll<24) type='moving';
  const w=type==='spike'?30:40+Math.random()*30;
  const x=Math.random()*(W-w);
  const vx=type==='moving'?(Math.random()<.5?-0.8:0.8):0;
  const p={x,y,w,type,vx,timer:0,broken:false};
  platforms.push(p);
  if(type!=='spike'&&Math.random()<0.08)
    coins.push({x:x+w/2,y:y-14,collected:false});
}

function spawnEnemy(y){
  let type;
  if(equippedTheme==='ocean'){
    const r=Math.random();
    type=r<0.45?'jellyfish':r<0.75?'puffer':r<0.9?'bat':'spikeball';
  } else if(equippedTheme==='sky'){
    const r=Math.random();
    type=r<0.45?'thunder':r<0.75?'hawk':r<0.9?'bat':'spikeball';
  } else if(equippedTheme==='lavacave'){
    const r=Math.random();
    type=r<0.45?'fireimp':r<0.75?'lavablob':r<0.9?'bat':'spikeball';
  } else {
    const r=Math.random();
    type=r<0.5?'slime':r<0.8?'bat':'spikeball';
  }
  const coinDrop=type==='slime'?2:type==='bat'?3:type==='jellyfish'?3:type==='thunder'?3:type==='fireimp'?3:type==='puffer'||type==='hawk'||type==='lavablob'?4:5;
  enemies.push({type,x:Math.random()*(W-16)+8,y,vx:(Math.random()<.5?-0.6:0.6),vy:0,hp:1,coins:coinDrop,shootTimer:2+Math.random()*2,phase:Math.random()*Math.PI*2});
}

function updatePlay(dt){
  shootCooldown-=dt;
  const speed=equippedSkin==='sky_wind'?3.8:2.5;
  if(keys['ArrowLeft']||keys['KeyA'])       ball.vx=-speed;
  else if(keys['ArrowRight']||keys['KeyD']) ball.vx= speed;
  else ball.vx*=0.8;
  const grav=equippedSkin==='sky_wind'?0.26:GRAVITY;
  ball.vy+=grav; ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.x<-BALL_R) ball.x=W+BALL_R;
  if(ball.x>W+BALL_R) ball.x=-BALL_R;
  if(ball.y<camY+H*.4){ camY-=(camY+H*.4)-ball.y; score=Math.max(score,Math.round(-camY/10)); if(score>bestScore){bestScore=score;LS.set('bb-best',bestScore);} }
  const topNeeded=camY-100;
  const highestPlatY=platforms.length?Math.min(...platforms.map(p=>p.y)):0;
  if(highestPlatY>topNeeded){
    genPlatform(highestPlatY-28-Math.random()*20);
    if(Math.random()<0.06) spawnEnemy(highestPlatY-50);
  }
  if(ball.vy>0&&!ball.dead){
    const coralX=equippedSkin==='ocean_coral'?14:0;
    for(const p of platforms){
      if(p.broken) continue;
      if(ball.x>=p.x-coralX&&ball.x<=p.x+p.w+coralX&&ball.y+BALL_R>=p.y&&ball.y+BALL_R<=p.y+PLAT_H+ball.vy+2){
        if(p.type==='spike'){killBall();break;}
        else if(p.type==='spring'){ball.vy=SPRING_VY;SFX.spring();}
        else{
          ball.vy=JUMP_VY;SFX.bounce();
          ball.bounceCount=(ball.bounceCount||0)+1;
          if(equippedSkin==='sky_cloud'&&ball.bounceCount%5===0){ball.invuln=2.5;spawnParticles(ball.x,ball.y,'#ffffff',10);}
          if(equippedSkin==='sky_rainbow'){score+=2;const rc=['#ff4488','#ffaa00','#44ffaa','#44aaff','#cc44ff'];spawnParticles(ball.x,ball.y,rc[ball.bounceCount%5],5);}
          if(equippedSkin==='ocean_tide'&&!tideReady){tideBounces++;if(tideBounces>=7){tideReady=true;tideBounces=0;spawnParticles(ball.x,ball.y,'#00ccff',8);}}
        }
        if(p.type==='breakable'){p.broken=true;p.timer=0.5;}
        break;
      }
    }
  }
  ball.invuln=Math.max(0,ball.invuln-dt);
  if(ball.y>camY+H+30) killBall();
  for(const p of platforms){
    if(p.type==='moving'){p.x+=p.vx;if(p.x<=0||p.x+p.w>=W)p.vx*=-1;}
    if(p.broken)p.timer-=dt;
  }
  platforms=platforms.filter(p=>p.y<camY+H+60&&!(p.broken&&p.timer<=0));
  globalFreezeTimer=Math.max(0,globalFreezeTimer-dt);
  for(const e of enemies){
    if(globalFreezeTimer>0){if(!ball.dead&&ball.invuln<=0){const dx=ball.x-e.x,dy=ball.y-e.y;const hr=e.type==='puffer'?(e.puffing?13:9):7;if(dx*dx+dy*dy<(BALL_R+hr)*(BALL_R+hr))killBall();}continue;}
    if(e.type==='slime'){
      e.x+=e.vx; if(e.x<8||e.x>W-8)e.vx*=-1;
      e.shootTimer-=dt;
      if(e.shootTimer<=0){
        e.shootTimer=2+Math.random()*2;
        const dx=ball.x-e.x,dy=ball.y-e.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
        enemyProjectiles.push({x:e.x,y:e.y,vx:dx/dist*2.5,vy:dy/dist*2.5});
      }
    } else if(e.type==='bat'){
      if(equippedSkin==='ocean_deep'){e.x+=e.vx*0.5;if(e.x<8||e.x>W-8)e.vx*=-1;}
      else{const dx=ball.x-e.x,dy=ball.y-e.y,dist=Math.sqrt(dx*dx+dy*dy)||1;e.x+=dx/dist*.5;e.y+=dy/dist*.5;}
    } else if(e.type==='thunder'){
      e.x+=e.vx*0.3; if(e.x<8||e.x>W-8)e.vx*=-1;
      e.shootTimer-=dt;
      if(e.shootTimer<=0){e.shootTimer=2.5+Math.random()*1.5;enemyProjectiles.push({x:e.x,y:e.y,vx:0,vy:7,etype:'lightning'});}
    } else if(e.type==='hawk'){
      if(Math.abs(ball.x-e.x)<22){
        e.vy=(e.vy||0)+0.9; e.y+=e.vy;
        if(e.y-camY>H+60){e.vy=-9;e.y=camY-40;}
      } else {
        e.vy=0; e.x+=e.vx*1.3; if(e.x<8||e.x>W-8)e.vx*=-1;
      }
    } else if(e.type==='fireimp'){
      if(equippedSkin==='ocean_deep'){e.x+=e.vx*0.5;if(e.x<8||e.x>W-8)e.vx*=-1;}
      else{const dx2=ball.x-e.x,dy2=ball.y-e.y,d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;e.x+=dx2/d2*0.85;e.y+=dy2/d2*0.85;}
    } else if(e.type==='lavablob'){
      e.phase+=0.03; e.y+=Math.sin(e.phase)*0.55;
      e.shootTimer-=dt;
      if(e.shootTimer<=0&&ball.y<e.y){e.shootTimer=3+Math.random()*2;enemyProjectiles.push({x:e.x,y:e.y,vx:(ball.x-e.x)*0.022,vy:-3.2,etype:'lava'});}
    } else if(e.type==='jellyfish'){
      e.phase+=0.04; e.y+=Math.sin(e.phase)*0.5;
      e.x+=e.vx*0.4; if(e.x<8||e.x>W-8)e.vx*=-1;
      e.shootTimer-=dt;
      if(e.shootTimer<=0){
        e.shootTimer=3+Math.random()*2;
        enemyProjectiles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*1.5,vy:-2.5,etype:'bubble'});
      }
    } else if(e.type==='puffer'){
      e.x+=e.vx*0.4; if(e.x<8||e.x>W-8)e.vx*=-1;
      const dx2=ball.x-e.x,dy2=ball.y-e.y;
      if(Math.sqrt(dx2*dx2+dy2*dy2)<65&&!e.puffing){
        e.puffing=true; e.puffTimer=0.5;
        for(let i=0;i<8;i++){const a=i*Math.PI/4;enemyProjectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,etype:'spike'});}
      }
      if(e.puffing){e.puffTimer-=dt;if(e.puffTimer<=0)e.puffing=false;}
    } else {
      e.vy=e.vy||0.6; e.y+=e.vy;
      if((e.y-camY)<0||(e.y-camY)>H+40)e.vy*=-1;
    }
    if(!ball.dead&&ball.invuln<=0){
      const dx=ball.x-e.x,dy=ball.y-e.y;
      const hr=e.type==='puffer'?(e.puffing?13:9):7;
      if(dx*dx+dy*dy<(BALL_R+hr)*(BALL_R+hr))killBall();
    }
  }
  enemies=enemies.filter(e=>e.y<camY+H+100&&e.y>camY-200);
  for(const ep of enemyProjectiles){
    ep.x+=ep.vx; ep.y+=ep.vy; if(ep.etype==='lava')ep.vy+=0.12;
    if(!ball.dead&&ball.invuln<=0){
      const dx=ball.x-ep.x,dy=ball.y-ep.y;
      if(dx*dx+dy*dy<(BALL_R+4)*(BALL_R+4)){killBall();ep.dead=true;}
    }
  }
  enemyProjectiles=enemyProjectiles.filter(ep=>!ep.dead&&ep.x>-10&&ep.x<W+10&&ep.y>camY-50&&ep.y<camY+H+50);
  for(const pr of projectiles){
    pr.x+=pr.vx; pr.y+=pr.vy;
    const hitR=equippedSkin==='lava_magma'?26:14;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i],dx=pr.x-e.x,dy=pr.y-e.y;
      if(dx*dx+dy*dy<hitR*hitR){
        const drop=equippedSkin==='lava_gold'?e.coins*2:e.coins;
        for(let k=0;k<drop;k++) coins.push({x:e.x+(Math.random()-.5)*12,y:e.y+(Math.random()-.5)*8,collected:false});
        if(equippedSkin==='lava_coal') score+=5;
        if(equippedSkin==='ocean_bubble'){globalFreezeTimer=1.5;spawnParticles(e.x,e.y,'#88eeff',8);}
        spawnParticles(e.x,e.y,'#ffcc00',6); enemies.splice(i,1); SFX.hit();
        pr.pierces=(pr.pierces||0)+1;
        if(equippedSkin!=='lava_crystal'||pr.pierces>=2) pr.dead=true;
        break;
      }
    }
  }
  projectiles=projectiles.filter(pr=>!pr.dead&&pr.x>-10&&pr.x<W+10&&pr.y>camY-50&&pr.y<camY+H+50);
  for(const cn of coins){
    if(cn.collected)continue;
    const dx=ball.x-cn.x,dy=ball.y-cn.y,distSq=dx*dx+dy*dy;
    if(equippedSkin==='sky_sun'&&distSq<70*70){const d=Math.sqrt(distSq)||1;cn.x+=dx/d*3.5;cn.y+=dy/d*3.5;}
    const collectR=equippedSkin==='sky_sun'?BALL_R+16:BALL_R+7;
    if(distSq<collectR*collectR){cn.collected=true;sessionCoins+=equippedSkin==='ocean_pearl'||equippedSkin==='lava_gold'?2:1;spawnParticles(cn.x,cn.y,'#ffd700',4);SFX.coin();}
  }
  coins=coins.filter(cn=>!cn.collected&&cn.y<camY+H+60);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=dt;}
  particles=particles.filter(p=>p.life>0);
  if(ball.dead&&!_deathScheduled){_deathScheduled=true;setTimeout(()=>{_deathScheduled=false;endGame();},800);}
}
let _deathScheduled=false;

function killBall(){if(ball.dead)return;ball.dead=true;spawnParticles(ball.x,ball.y,'#a8f0c8',12);SFX.die();}
function spawnParticles(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*2;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,col});}}
function endGame(){totalCoins+=sessionCoins;saveAll();document.getElementById('goScore').textContent=score;document.getElementById('goCoins').textContent=sessionCoins;document.getElementById('goBest').textContent=bestScore;show('gameoverOv');state='gameover';}

// ── Menu scene: one ball on one platform ──
// Panel height ~45% of canvas = ~162px. Playfield = top 198px. Platform centre ~y=130.
const menuScene={
  ball:{x:W/2,y:110,vx:0,vy:-3},
  plat:{x:W/2-30,y:140,w:60},
  t:0,
};
function updateMenuScene(dt){
  const b=menuScene.ball;
  b.vy+=0.32; b.y+=b.vy;
  const p=menuScene.plat;
  if(b.vy>0&&b.y+BALL_R>=p.y&&b.y+BALL_R<=p.y+8+b.vy+2){
    b.vy=-7; SFX.bounce();
  }
  if(b.y>165){b.y=165;b.vy=-7;}
  menuScene.t+=dt;
}
function drawMenuScene(){
  // draw the equipped theme's background
  THEMES_DEF[equippedTheme].bg(0);
  // single platform
  const p=menuScene.plat;
  ctx.fillStyle=THEMES_DEF[equippedTheme].pfCol;
  ctx.fillRect(p.x,p.y,p.w,PLAT_H);
  ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(p.x,p.y,p.w,1);
  // ball
  SKINS[equippedSkin].draw(ctx,menuScene.ball.x,menuScene.ball.y,BALL_R);
  // scanlines
  ctx.fillStyle='rgba(0,0,0,.06)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
}

// ── Draw ──
function draw(){
  ctx.clearRect(0,0,W,H);
  if(state==='menu'){drawMenuScene();return;}
  if(state==='gameover'){drawMenuScene();return;}
  if(state==='paused')return;
  THEMES_DEF[equippedTheme].bg(camY);
  for(const p of platforms){const py=p.y-camY;if(py<-10||py>H+10)continue;drawPlatform(p,py);}
  for(const cn of coins){const cy2=cn.y-camY;if(cy2<-10||cy2>H+10)continue;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(cn.x,cy2,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffee88';ctx.beginPath();ctx.arc(cn.x-1,cy2-1,1.5,0,Math.PI*2);ctx.fill();}
  for(const e of enemies){const ey=e.y-camY;if(ey<-20||ey>H+20)continue;drawEnemy(e,ey);}
  for(const ep of enemyProjectiles){const epy=ep.y-camY;if(ep.etype==='bubble'){ctx.fillStyle='rgba(80,200,255,0.5)';ctx.beginPath();ctx.arc(ep.x,epy,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(160,240,255,0.8)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ep.x,epy,5,0,Math.PI*2);ctx.stroke();}else if(ep.etype==='spike'){ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(ep.x,epy,3,0,Math.PI*2);ctx.fill();}else if(ep.etype==='lightning'){ctx.strokeStyle='#ffe040';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ep.x-2,epy-6);ctx.lineTo(ep.x+2,epy-1);ctx.lineTo(ep.x-1,epy+3);ctx.lineTo(ep.x+2,epy+7);ctx.stroke();ctx.fillStyle='rgba(255,240,80,0.4)';ctx.beginPath();ctx.arc(ep.x,epy,5,0,Math.PI*2);ctx.fill();}else if(ep.etype==='lava'){ctx.fillStyle='#ff5500';ctx.beginPath();ctx.arc(ep.x,epy,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,160,0,0.5)';ctx.beginPath();ctx.arc(ep.x,epy,6,0,Math.PI*2);ctx.fill();}else{ctx.fillStyle='#88ff44';ctx.beginPath();ctx.arc(ep.x,epy,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(100,255,50,.4)';ctx.beginPath();ctx.arc(ep.x,epy,5,0,Math.PI*2);ctx.fill();}}
  for(const pr of projectiles){const pry=pr.y-camY;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(pr.x,pry,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,255,220,.5)';ctx.beginPath();ctx.arc(pr.x,pry,5,0,Math.PI*2);ctx.fill();}
  if(!ball.dead){const by=ball.y-camY;if(ball.invuln>0&&Math.floor(ball.invuln*10)%2===0)ctx.globalAlpha=.4;SKINS[equippedSkin].draw(ctx,ball.x,by,BALL_R);ctx.globalAlpha=1;if(equippedSkin==='sky_cloud'&&ball.invuln>0){ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ball.x,by,BALL_R+5,0,Math.PI*2);ctx.stroke();}if(equippedSkin==='sky_sun'){ctx.strokeStyle='rgba(255,220,0,0.35)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ball.x,by,BALL_R+38,0,Math.PI*2);ctx.stroke();}}
  for(const p of particles){ctx.fillStyle=p.col;ctx.globalAlpha=p.life*2;ctx.fillRect(p.x-1,p.y-camY-1,2,2);}
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,W,18);
  ctx.font='bold 9px Courier New';
  ctx.fillStyle='#a8f0c8';ctx.fillText('▲'+score,4,12);
  ctx.fillStyle='#ffd700';ctx.fillText('🪙'+totalCoins,W/2-15,12);
  ctx.fillStyle='#ccc';ctx.fillText('BEST:'+bestScore,W-70,12);
  const _abilHUD={sky_cloud:'☁ SHIELD',sky_sun:'☀ MAGNET',sky_storm:'⚡ 3-SHOT',sky_rainbow:'🌈 +SCORE',sky_wind:'💨 SPEED',ocean_bubble:'🫧 FREEZE',ocean_coral:'🪸 WIDE',ocean_pearl:'🪸 ×2 COIN',ocean_deep:'🌑 ABYSS',lava_magma:'🌋 AOE',lava_crystal:'💎 PIERCE',lava_skull:'💀 INVULN',lava_coal:'🪨 +SCORE',lava_gold:'✨ ×2 DROP'};
  if(equippedSkin==='ocean_tide'){ctx.font='bold 7px Courier New';ctx.fillStyle=tideReady?'#00eeff':'rgba(0,180,220,.8)';ctx.fillText(tideReady?'🌊 READY! [R-CLICK]':'🌊 TIDE '+tideBounces+'/7',4,26);}
  else if(_abilHUD[equippedSkin]){ctx.font='bold 7px Courier New';ctx.fillStyle='rgba(160,210,255,.8)';ctx.fillText(_abilHUD[equippedSkin],4,26);}
}

function drawPlatform(p,py){
  const col=p.type==='normal'?THEMES_DEF[equippedTheme].pfCol:p.type==='moving'?'#d090f0':p.type==='breakable'?'#e8c090':p.type==='spring'?'#f0e060':'#e86060';
  if(p.type==='spike'){
    const n=Math.floor(p.w/8);ctx.fillStyle=col;
    for(let i=0;i<n;i++){const sx=p.x+i*8;ctx.beginPath();ctx.moveTo(sx,py+PLAT_H);ctx.lineTo(sx+4,py-4);ctx.lineTo(sx+8,py+PLAT_H);ctx.closePath();ctx.fill();}
    ctx.fillStyle='#ff4040';for(let i=0;i<n;i++)ctx.fillRect(p.x+i*8+3,py-2,2,2);return;
  }
  ctx.fillStyle=col;ctx.fillRect(p.x,py,p.w,PLAT_H);
  if(p.type==='breakable'){
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.beginPath();
    ctx.moveTo(p.x+p.w*.3,py);ctx.lineTo(p.x+p.w*.4,py+PLAT_H);
    ctx.moveTo(p.x+p.w*.6,py);ctx.lineTo(p.x+p.w*.5,py+PLAT_H);ctx.stroke();
    if(p.broken){ctx.strokeStyle='rgba(0,0,0,.7)';ctx.beginPath();ctx.moveTo(p.x+p.w*.2,py+1);ctx.lineTo(p.x+p.w*.8,py+3);ctx.stroke();}
  } else if(p.type==='spring'){
    ctx.fillStyle='#b8a020';const cx2=p.x+p.w/2;
    ctx.fillRect(cx2-4,py-5,8,2);ctx.fillRect(cx2-3,py-8,6,2);ctx.fillRect(cx2-4,py-11,8,2);
    ctx.fillStyle='#806010';ctx.fillRect(cx2-5,py-1,10,2);
  } else if(p.type==='moving'){
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(p.x+3,py+2,4,2);ctx.fillRect(p.x+p.w-7,py+2,4,2);
  }
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(p.x,py,p.w,1);
}

function drawEnemy(e,ey){
  if(e.type==='thunder'){
    ctx.fillStyle='rgba(200,210,230,0.92)';ctx.beginPath();ctx.arc(e.x,ey,9,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x-7,ey+2,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+7,ey+2,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#445';ctx.beginPath();ctx.arc(e.x-3,ey-1,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+3,ey-1,1.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffe040';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(e.x-1,ey+7);ctx.lineTo(e.x+2,ey+11);ctx.lineTo(e.x-1,ey+13);ctx.stroke();
  } else if(e.type==='hawk'){
    const dir=e.vx>0?1:-1;
    ctx.fillStyle='#c07030';ctx.beginPath();ctx.ellipse(e.x,ey,8,5,dir*0.25,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a05020';ctx.beginPath();ctx.ellipse(e.x-dir*8,ey-2,9,3,dir*-0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffe040';ctx.beginPath();ctx.arc(e.x+dir*5,ey,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e08020';ctx.beginPath();ctx.moveTo(e.x+dir*8,ey+1);ctx.lineTo(e.x+dir*12,ey+3);ctx.lineTo(e.x+dir*8,ey+5);ctx.fill();
  } else if(e.type==='fireimp'){
    ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(e.x,ey,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(e.x,ey,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc2200';ctx.beginPath();ctx.moveTo(e.x-3,ey-5);ctx.lineTo(e.x-6,ey-10);ctx.lineTo(e.x-1,ey-5);ctx.fill();ctx.beginPath();ctx.moveTo(e.x+3,ey-5);ctx.lineTo(e.x+6,ey-10);ctx.lineTo(e.x+1,ey-5);ctx.fill();
    ctx.fillStyle='#ffee00';ctx.beginPath();ctx.arc(e.x-2,ey-1,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+2,ey-1,1.5,0,Math.PI*2);ctx.fill();
  } else if(e.type==='lavablob'){
    ctx.fillStyle='#cc3300';ctx.beginPath();ctx.arc(e.x,ey,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(e.x,ey,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(e.x,ey,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,120,0,0.55)';ctx.beginPath();ctx.arc(e.x-4,ey-9,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+4,ey-8,2,0,Math.PI*2);ctx.fill();
  } else if(e.type==='slime'){
    ctx.fillStyle='#88e060';ctx.beginPath();ctx.ellipse(e.x,ey,8,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(e.x-3,ey-2,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+3,ey-2,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(e.x-3,ey-2,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+3,ey-2,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#559933';ctx.fillRect(e.x+(e.vx>0?6:-10),ey-1,4,3);
  } else if(e.type==='bat'){
    ctx.fillStyle='#8040c0';ctx.beginPath();ctx.ellipse(e.x,ey,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6020a0';ctx.beginPath();ctx.ellipse(e.x-9,ey-1,6,3,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(e.x+9,ey-1,6,3,.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4040';ctx.beginPath();ctx.arc(e.x-2,ey,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+2,ey,1.5,0,Math.PI*2);ctx.fill();
  } else if(e.type==='jellyfish'){
    ctx.fillStyle='rgba(160,80,220,0.75)';ctx.beginPath();ctx.arc(e.x,ey,8,Math.PI,0);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(210,140,255,0.5)';ctx.beginPath();ctx.arc(e.x,ey,5,Math.PI,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(180,80,240,0.7)';ctx.lineWidth=1;
    const ph=e.phase||0;
    for(let i=0;i<4;i++){const tx=e.x+(i-1.5)*4;ctx.beginPath();ctx.moveTo(tx,ey);ctx.bezierCurveTo(tx+Math.sin(ph+i)*2,ey+4,tx+Math.sin(ph+i+1)*2,ey+8,tx+Math.sin(ph+i)*3,ey+12);ctx.stroke();}
  } else if(e.type==='puffer'){
    const pr=e.puffing?11:7;
    ctx.fillStyle=e.puffing?'#ff8800':'#ffaa22';ctx.beginPath();ctx.arc(e.x,ey,pr,0,Math.PI*2);ctx.fill();
    if(e.puffing){ctx.strokeStyle='#ff4400';ctx.lineWidth=1.5;for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(e.x+Math.cos(a)*pr,ey+Math.sin(a)*pr);ctx.lineTo(e.x+Math.cos(a)*(pr+5),ey+Math.sin(a)*(pr+5));ctx.stroke();}}
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(e.x-2,ey-1,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(e.x-2,ey-1,1,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#c04040';ctx.beginPath();ctx.arc(e.x,ey,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e06060';for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.fillRect(e.x+Math.cos(a)*6-1,ey+Math.sin(a)*6-1,3,3);}
  }
}

// ── Game loop ──
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  if(state==='play')updatePlay(dt);
  else if(state!=='paused')updateMenuScene(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(loop);});

// ── Input ──
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyE')togglePause();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

const wrap=document.getElementById('wrap');
wrap.addEventListener('click',e=>{
  if(state==='paused'){togglePause();return;}
  if(state==='play'){
    if(shootCooldown>0)return;
    if(equippedSkin==='sky_storm'){
      projectiles.push({x:ball.x,y:ball.y,vx:-2,vy:-6.5});
      projectiles.push({x:ball.x,y:ball.y,vx:0,vy:-7});
      projectiles.push({x:ball.x,y:ball.y,vx:2,vy:-6.5});
    }else{
      projectiles.push({x:ball.x,y:ball.y,vx:0,vy:-7});
    }
    shootCooldown=.5;SFX.shoot();
    return;
  }
  // menu/gameover: tap non-interactive → start
  if(state==='menu'||state==='gameover'){
    if(e.target.closest('button,.arr,#skinPreviewC,#themePreviewC,#skinLabel,#skinPrice,#themeLabel,#themePrice'))return;
    startGame(true);
  }
});

wrap.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(state==='play'&&equippedSkin==='ocean_tide'&&tideReady){
    ball.vy=SPRING_VY;tideReady=false;tideBounces=0;
    spawnParticles(ball.x,ball.y,'#00ccff',12);spawnParticles(ball.x,ball.y,'#ffffff',6);
  }
});

// ── Helpers ──
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function hideAll(){['menuOv','gameoverOv','pauseOv'].forEach(hide);}

function startGame(highJump=false){
  hideAll();
  newGame();
  if(highJump) ball.vy=JUMP_VY*2.2;
  state='play';
}

function togglePause(){
  if(state==='play'){
    state='paused';
    document.getElementById('pauseScore').textContent=score;
    document.getElementById('pauseCoins').textContent=totalCoins;
    show('pauseOv');
  } else if(state==='paused'){
    state='play';hide('pauseOv');
  }
}

// ── Skin picker ──
let skinPickerIdx=Math.max(0,getActiveSkinList().indexOf(equippedSkin));
function renderSkinPicker(){
  const id=getActiveSkinList()[skinPickerIdx];
  const sk=SKINS[id];
  const owned=ownedSkins.includes(id),eq=equippedSkin===id;
  const c=document.getElementById('skinPreviewC');
  const cx2=c.getContext('2d');cx2.clearRect(0,0,36,36);sk.draw(cx2,18,18,13);
  c.style.borderColor=eq?'#ffd700':'#2a4a3a';
  document.getElementById('skinLabel').textContent=sk.name;
  const prEl=document.getElementById('skinPrice');
  const buyBtn=document.getElementById('btnBuySkin');
  if(owned){
    prEl.textContent=eq?'EQUIPPED':'OWNED'; prEl.style.color=eq?'#ffd700':'#a8f0c8';
    buyBtn.style.display=eq?'none':'inline-block'; buyBtn.textContent='USE'; buyBtn.disabled=false; buyBtn.style.opacity='1';
  } else {
    prEl.textContent='🪙 '+sk.cost; prEl.style.color='#ffd700';
    buyBtn.style.display='inline-block'; buyBtn.textContent='BUY';
    buyBtn.disabled=totalCoins<sk.cost; buyBtn.style.opacity=totalCoins<sk.cost?'.4':'1';
  }
}
document.getElementById('skinLeft').addEventListener('click',e=>{e.stopPropagation();const sl=getActiveSkinList();skinPickerIdx=(skinPickerIdx-1+sl.length)%sl.length;renderSkinPicker();});
document.getElementById('skinRight').addEventListener('click',e=>{e.stopPropagation();const sl=getActiveSkinList();skinPickerIdx=(skinPickerIdx+1)%sl.length;renderSkinPicker();});
document.getElementById('btnBuySkin').addEventListener('click',e=>{
  e.stopPropagation();
  const sl=getActiveSkinList();const id=sl[skinPickerIdx];const sk=SKINS[id];const owned=ownedSkins.includes(id);
  if(owned){equippedSkin=id;LS.set('bb-eskin',id);}
  else if(totalCoins>=sk.cost){totalCoins-=sk.cost;ownedSkins.push(id);equippedSkin=id;saveAll();document.getElementById('menuCoins').textContent=totalCoins;}
  skinPickerIdx=sl.indexOf(equippedSkin);
  renderSkinPicker();
});

// ── Theme picker ──
let themePickerIdx=Math.max(0,THEME_LIST.indexOf(equippedTheme));
function drawThemePreview(id){
  const c=document.getElementById('themePreviewC');
  const cx2=c.getContext('2d');cx2.clearRect(0,0,36,36);
  cx2.fillStyle=id==='sky'?'#87ceeb':id==='ocean'?'#006080':'#1a0500';
  cx2.fillRect(0,0,36,36);
  cx2.fillStyle=THEMES_DEF[id].pfCol;cx2.fillRect(4,26,28,5);
  // small ball
  cx2.fillStyle='#a8f0c8';cx2.beginPath();cx2.arc(18,18,5,0,Math.PI*2);cx2.fill();
}
function renderThemePicker(){
  const id=THEME_LIST[themePickerIdx];
  const th=THEMES_DEF[id];
  const owned=ownedThemes.includes(id),eq=equippedTheme===id;
  drawThemePreview(id);
  document.getElementById('themePreviewC').style.borderColor=eq?'#ffd700':'#2a4a3a';
  document.getElementById('themeLabel').textContent=th.name;
  const prEl=document.getElementById('themePrice');
  const buyBtn=document.getElementById('btnBuyTheme');
  if(owned){
    prEl.textContent=eq?'EQUIPPED':'OWNED'; prEl.style.color=eq?'#ffd700':'#a8f0c8';
    buyBtn.style.display=eq?'none':'inline-block'; buyBtn.textContent='USE'; buyBtn.disabled=false; buyBtn.style.opacity='1';
  } else {
    prEl.textContent='🪙 '+th.cost; prEl.style.color='#ffd700';
    buyBtn.style.display='inline-block'; buyBtn.textContent='BUY';
    buyBtn.disabled=totalCoins<th.cost; buyBtn.style.opacity=totalCoins<th.cost?'.4':'1';
  }
}
document.getElementById('themeLeft').addEventListener('click',e=>{e.stopPropagation();themePickerIdx=(themePickerIdx-1+THEME_LIST.length)%THEME_LIST.length;renderThemePicker();});
document.getElementById('themeRight').addEventListener('click',e=>{e.stopPropagation();themePickerIdx=(themePickerIdx+1)%THEME_LIST.length;renderThemePicker();});
document.getElementById('btnBuyTheme').addEventListener('click',e=>{
  e.stopPropagation();
  const id=THEME_LIST[themePickerIdx];const th=THEMES_DEF[id];const owned=ownedThemes.includes(id);
  if(owned){equippedTheme=id;LS.set('bb-etheme',id);}
  else if(totalCoins>=th.cost){totalCoins-=th.cost;ownedThemes.push(id);equippedTheme=id;saveAll();document.getElementById('menuCoins').textContent=totalCoins;}
  themePickerIdx=THEME_LIST.indexOf(equippedTheme);
  // reset skin to first of new map if current skin doesn't belong there
  const newSkinList=getActiveSkinList();
  if(!newSkinList.includes(equippedSkin)){equippedSkin=newSkinList[0];LS.set('bb-eskin',equippedSkin);}
  skinPickerIdx=Math.max(0,newSkinList.indexOf(equippedSkin));
  renderThemePicker();
  renderSkinPicker();
});

// ── Menu / overlay buttons ──
document.getElementById('btnResume').addEventListener('click',()=>togglePause());
document.getElementById('btnPauseMenu').addEventListener('click',()=>{hideAll();state='menu';updateMenuUI();show('menuOv');});
document.getElementById('btnRetry').addEventListener('click',()=>startGame(false));
document.getElementById('btnMenu').addEventListener('click',()=>{hideAll();state='menu';updateMenuUI();show('menuOv');});

function updateMenuUI(){
  document.getElementById('menuBest').textContent=bestScore;
  document.getElementById('menuCoins').textContent=totalCoins;
  skinPickerIdx=Math.max(0,getActiveSkinList().indexOf(equippedSkin));
  themePickerIdx=Math.max(0,THEME_LIST.indexOf(equippedTheme));
  renderSkinPicker(); renderThemePicker();
}


// ── Init ──
updateMenuUI();
show('menuOv');
</script>
